backend:
  name: github
  repo: Mirikazi0/22-Tango-Website
  branch: main # Change to master if your primary git branch is master
  base_url: https://decap-cms-oauth-server.vercel.app

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "blog"
    label: "Blog Notes"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Category", name: "category", widget: "select", options: ["Creative Process", "Mentorship", "Studio Technique"] }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Card Color Theme", name: "color", widget: "select", options: ["white", "mint", "yellow", "orange"] }
      - { label: "Short Excerpt", name: "excerpt", widget: "text" }
      - { label: "Body Content", name: "body", widget: "markdown" }
